<!-- @dsCard group="Type" viewport="700x210" name="Body & labels" subtitle="Body 400 at 1.5 line-height; labels 500; secondary text via opacity" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-ui); background: var(--color-surface); color: var(--text-primary); display: flex; gap: 32px; }
  .col { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .spec { font: var(--type-caption); color: var(--text-tertiary); }
  p { margin: 0; }
</style>
</head>
<body>
  <div class="col">
    <p style="font: var(--type-body-lg);">Body Large is the primary reading text. A generous 1.5 line-height keeps longer passages calm and readable.</p>
    <span class="spec">16 / 400 / 1.5</span>
  </div>
  <div class="col">
    <p style="font: var(--type-body-md); color: var(--text-secondary);">Body Medium carries secondary text and always pairs with the 60% opacity color, not a separate grey.</p>
    <span class="spec">14 / 400 / 1.5 · 60%</span>
    <p style="font: var(--type-label); color: var(--color-primary);">Button label</p>
    <span class="spec">16 / 500 · labels &amp; tabs</span>
  </div>
</body>
</html>

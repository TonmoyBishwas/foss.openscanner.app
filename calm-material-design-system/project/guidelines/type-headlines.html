<!-- @dsCard group="Type" viewport="700x200" name="Headlines & titles" subtitle="Doto dot matrix 700 for headlines & big numbers only; Hanken Grotesk 600 titles" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-ui); background: var(--color-surface); color: var(--text-primary); display: flex; flex-direction: column; gap: 12px; }
  .spec { font: var(--type-caption); color: var(--text-tertiary); margin-left: 16px; font-weight: 400; letter-spacing: 0; }
  h1, h2, h3 { margin: 0; display: flex; align-items: baseline; }
</style>
</head>
<body>
  <h1 style="font: var(--type-headline-lg); letter-spacing: var(--tracking-display);">Headline Large <span class="spec">Doto · 32 / 700</span></h1>
  <h2 style="font: var(--type-headline-md); letter-spacing: var(--tracking-display);">Headline Medium <span class="spec">Doto · 24 / 700</span></h2>
  <h3 style="font: var(--type-title);">Title / App bar <span class="spec">Hanken · 18 / 600</span></h3>
</body>
</html>

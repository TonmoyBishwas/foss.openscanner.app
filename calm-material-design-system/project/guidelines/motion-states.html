<!-- @dsCard group="Brand" viewport="700x160" name="Motion & states" subtitle="Quiet fades on M3 standard easing; hover 8% / press 10–12% state layers" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-ui); background: var(--color-surface); display: flex; gap: 16px; align-items: center; }
  .cell { flex: 1; background: var(--surface-card); border-radius: var(--radius-control); padding: 14px 16px; display: flex; flex-direction: column; gap: 2px; }
  .n { font: var(--type-label); font-size: 14px; color: var(--text-primary); }
  .l { font: var(--type-caption); color: var(--text-secondary); }
  .hoverable { transition: background var(--duration-quick) var(--ease-standard); cursor: pointer; }
  .hoverable:hover { background: color-mix(in srgb, var(--color-on-surface) 8%, var(--surface-card)); }
  .hoverable:active { background: color-mix(in srgb, var(--color-on-surface) 12%, var(--surface-card)); }
</style>
</head>
<body>
  <div class="cell hoverable"><span class="n">Hover me</span><span class="l">8% on-surface layer</span></div>
  <div class="cell hoverable"><span class="n">Press me</span><span class="l">10–12% layer, no shrink</span></div>
  <div class="cell"><span class="n">150 / 250 ms</span><span class="l">standard ease · no bounces</span></div>
</body>
</html>

<!-- @dsCard group="Brand" viewport="700x160" name="Wordmark" subtitle="No logo mark exists — the brand renders as plain type" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-ui); background: var(--color-surface); display: flex; align-items: center; justify-content: center; gap: 48px; height: 112px; }
  .mark { display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .l { font: var(--type-caption); color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="mark">
    <span style="font: var(--type-headline-md); letter-spacing: var(--tracking-display); color: var(--text-primary);">Calm Material</span>
    <span class="l">design language · Doto 24/700</span>
  </div>
  <div class="mark">
    <span style="font: var(--type-title); color: var(--color-primary);">LensBite</span>
    <span class="l">source app · title style, primary tint</span>
  </div>
</body>
</html>

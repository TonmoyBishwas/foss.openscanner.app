<!-- @dsCard group="Brand" viewport="700x180" name="Icons — Material Symbols Rounded" subtitle="24px, weight 400, outline; fill for active; primary tint = brand/active" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; font-family: var(--font-ui); background: var(--color-surface); color: var(--color-on-surface); display: flex; flex-direction: column; gap: 16px; }
  .row { display: flex; gap: 24px; align-items: center; }
  .l { font: var(--type-caption); color: var(--text-secondary); width: 130px; }
</style>
</head>
<body>
  <div class="row">
    <span class="l">Neutral · on-surface</span>
    <span class="cm-icon">home</span>
    <span class="cm-icon">photo_camera</span>
    <span class="cm-icon">search</span>
    <span class="cm-icon">settings</span>
    <span class="cm-icon">notifications</span>
    <span class="cm-icon">history</span>
    <span class="cm-icon">chevron_right</span>
  </div>
  <div class="row" style="color: var(--color-primary);">
    <span class="l" style="color: var(--text-secondary);">Active · primary + fill</span>
    <span class="cm-icon cm-icon--fill">home</span>
    <span class="cm-icon cm-icon--fill">photo_camera</span>
    <span class="cm-icon cm-icon--fill">favorite</span>
    <span class="cm-icon cm-icon--fill">settings</span>
    <span class="cm-icon cm-icon--fill">notifications</span>
    <span class="cm-icon cm-icon--fill">bookmark</span>
    <span class="cm-icon cm-icon--fill">check_circle</span>
  </div>
</body>
</html>

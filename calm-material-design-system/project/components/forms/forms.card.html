<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body { margin: 0; font-family: var(--font-ui); background: var(--color-surface); }</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { TextField, Chip, Switch } = window.CalmMaterialDesignSystem_a3bee2;
function Demo() {
  const [on, setOn] = React.useState(true);
  const [sel, setSel] = React.useState(0);
  return (
    <div style={{ padding: "24px", display: "flex", flexDirection: "column", gap: "16px" }}>
      <div style={{ display: "flex", gap: "16px" }}>
        <TextField label="Email" placeholder="you@example.com" leadingIcon="mail" style={{ flex: 1 }} />
        <TextField label="Portion size" variant="filled" placeholder="e.g. 250 g" style={{ flex: 1 }} />
        <TextField label="Name" error supportingText="Required" style={{ flex: 1 }} />
      </div>
      <div style={{ display: "flex", gap: "8px", alignItems: "center" }}>
        {["All", "Vegetarian", "High protein", "Low carb"].map((c, i) => (
          <Chip key={c} selected={sel === i} onClick={() => setSel(i)}>{c}</Chip>
        ))}
        <Chip icon="tune">Filters</Chip>
        <span style={{ flex: 1 }}></span>
        <span style={{ font: "var(--type-body-md)", color: "var(--text-secondary)" }}>Dark mode</span>
        <Switch checked={on} onChange={setOn} label="Dark mode" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
